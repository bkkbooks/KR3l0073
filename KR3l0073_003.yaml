body:
  text: 獨醒雜志卷三宋曽敏行撰東坡北歸至嶺下偶肩輿折杠求竹於龍光寺僧惠兩大竿且延東坡飯時寺無主僧州郡方令往南華招諸未至公遂留詩以寄之詩云斫得龍光竹兩竿持歸嶺北萬人看竹中一滴曹溪水漲起江西十八灘謂贑石也東坡至留數日將發舟一夕江水大漲贛石無一見越日而至廬陵舟中見謝民師因謂曰舟行江漲遂不知有贑石此吾龍光詩讖也民師問其故東坡舉以詩之本末秦少遊賀方回相繼以歌詞知名少遊有詞云醉卧古藤隂下了不知南北其後遷謫卒於藤州光華亭上方回亦有詞云當年曽到王陵鋪鼓角悲風千嵗遼東回首人間萬事空後卒於北門門外有王陵鋪人皆以為詩讖云秦少遊之子湛自古藤護喪北歸其壻范溫候於零陵同至長沙適與山谷相遇溫淳夫之子也淳夫既沒山谷亦未弔其子至是與二子者執手大哭遂以銀二十兩為賻湛曰公方為逺役又安能有力相及且某歸計亦粗辦願復歸之山谷曰爾父吾同門友也相與之義幾猶骨肉今死不得預殮葬不得往送負爾父多矣是姑見吾不忘之意非以賄也湛不敢辭既别以詩寄二子有曰昔在秦少遊許我同門友又曰范公太史僚山立乃先逹又曰往時髙交友宰木既樅樅今我二三子事業在燈忩今集中載晚泊沙走筆寄秦處度范元實五詩是也前輩於死生交友之義如此紹興庚辰殿試上取特奏名進士試卷閲之一日御小殿召對讀問云鶴鳴却寫作隺鳴嗚呼却寫作鳴呼何也臨川人李德逺浩時以刪定官充對讀即啓云臣讀至此亦竊疑之然以其本正如此不敢改易嘗以針穿記其側乞宣正本審驗上令取視之果如其言稱歎德逺之精密者久之客舍中有題詩一聨云水向石邉流處冷風從花裏過來香或云唐人詩亦妙句也杜少陵卒於荆楚歸葬於陕此元微之墓志所載而衡之耒陽有少陵墓史氏因以為聶令具牛酒迎之一夕大醉而卒故聶令因為之藁葬微之之志云旅殯嶽陽其孫元和中改葬於鞏讀其墓志當以是為正史氏未詳本末也陶母不知終於何地而今陶母墓在在有之新塗闤闠中亦有陶母墓李太白世傳乘醉捉月溺死於水今白墓在采石又在州東青山一所而有二墓耒陽少陵墓殆此類耳梅聖俞送歐陽闢晦夫詩有曰我家無梧桐安可久棲鳯鳯窠在桂林烏哺不得共晦夫桂林人嘗從聖俞學及其南歸故以是詩贈之蘇眀允初至京師時東坡與子由年甚少人鮮有知者聖俞獨竒之故贈眀允詩有云嵗月不知老家有雛鳯凰百鳥戢羽翼不敢呈文章後東坡謫海南過合浦始識晦夫談論纍日晦夫因出聖俞贈行之詩東坡讀畢執晦夫手笑曰君年六十六余雖少而白髮蒼顔大略相似困亦不甚相逺聖俞所謂鳯例如此天下皆言聖俞以詩窮吾二人又窮於聖俞之詩可不一大笑乎東坡嘗與山谷論書東坡曰魯直近字雖清徑而筆勢有時大瘦幾如樹梢挂蛇山谷曰公之字固不敢輕議然間覺褊淺亦甚似石壓蝦蟇二公大笑以為深中其病玊笥飈御廟乃西嶽之别祠初為雲騰廟許覺之書三大字後改賜今名唐之神多唐衣冠傳聞其像皆唐所塑帝像不冕而冠蓋章聖東封後始册帝號土人屢欲更像迄不得卜水旱疾疫有禱輒應逺近數百里舉子當秋賦亦皆往謁始因劉公美中嘗致禱神降之夢有詩云來年三月春盛時驊騮穩步金街西劉公自是舉進士中詞科出入中外終於兵部尚書顯謨閣學士故皆以為夢之符如是外舅謝公世林方舍法盛時再貢不第其居距祠不下數里嵗時奉祠惟謹一日以科目禱焉夢中亦得詩句云欲留年少待富貴富貴不來年少去乃樂天詩也外舅自是不復南宫大廷之試尋以疾終玊笥山清真宫乃太秀法樂洞天兩山回合澗水橫陳門外三峯如削玉古木壽藤幽森清峭環此山十里無居人道書謂九天司命真君在焉輒以血食入宫中夜必有光怪或自外茹之而來宿者夜亦驚魘不能寐凡病於宫中垂死必不可生者氣厭厭不絶必舁出十里外乃絶相傳云山中不容有死氣此最異也范信中名寥為士時慷慨好俠故山谷詩寄校理范寥有黃犬蒼鷹伐狐兔之句舒州張懷素以幻術遊公卿間號落魄野人與朝士吳安詩子侄吳侔吳儲等結連信中以其謀為不靖也欲入京告變而無其資湯東野實資送之朝廷逮捕懷素等窮竟其事大觀元年獄成坐纍者餘百數而侔儲十數人皆處極刑雖其父母亦皆竄貶信中獲賞賚甚厚乃推以與東野故東野由監簿積纍至從官寥亦以供備庫副使纍遷諸路戎鈐晚年終於閩中丁晉公家書畫填委南遷之日籍其所藏得李成山水寒林九十餘軸他物往往稱是初晉公自兩制出守金陵陛辭之日章聖以八幅𡊮安卧雪圖賜之旁題云臣黃居宷定到神品蓋不知為誰筆也其所畫林石廬舍之所人地苦寒之態無不逼真侈上之賜於金陵城西北隅築堂曰賞心施此圖於巨屏觀者驚異乃知公之嗜畫上且時有以增益之也往有從官典藩數與賊戰不利既召還一日於朝路中戲同列曰衣冠佩玉而旋舍人給事蓋其人欲溲溺而時適兼二職耳未及對熊叔雅聲應曰棄甲曳兵而走安撫尚書聞者以為善對而被誚者不堪祖宗時知開封府多以翰林學士為之若除知制誥給諌待制卿列則為權發遣然須用天下之望且有政術者薑公遵謂之薑擦子薛公奎謂之薛出油皆以為政清嚴公正使人愛而畏之若包孝肅之政至今人以為稱説然知府事者亦未有不為執政也崇寧錢文徽宗嘗令蔡京書之筆畫從省崇字中以一筆上下相貫寧字中不從心當時識者謂京有意破宗無心寧國後乃更之徽宗初改元曰建中靖國本謂建大中之道無熙寧元祐之分也將令學士撰詔曽子宣言建中乃唐德宗幸奉天時年號不若更之上曰太平亦梁末帝禪位年號太宗用之初何嫌焉遂下詔不疑蔡京復用盡變元祐之政改元曰崇寧崇寧者謂崇熙寧也永州士人有登第者范忠宣公實識之一日問客曰某人何故不歸對曰將試教官公不悅曰初登第當勤吏事若為教官是自惰也歎惜久之胡安定居湖學建治道齋俾講政事者居之劉彛以能治水見稱後治郡率能興水利彛守章貢州城東西瀕江每春夏水潦入城民嘗病浸水退則人多疾死前後太守莫能治彛至乃令城門各造水忩凡十有三間水至則閉退則啓啓閉以時水患遂息東坡守徐州作燕子樓樂章方具稿人未知之一日忽閧傳城中東坡訝焉詰其所從來乃謂發端於邏卒東坡召而問之對曰某稍知音律嘗夜宿張建封廟有歌聲細聽之乃此詞也記而傳之初不知何謂東坡笑而遣之杜鎬在江南時待試於有司一日旅邸方晝寢忽有鼠銜文一卷自門竇而入鎬寤而逐之鼠不驚走以書置之床前而去取其書而觀之乃孝經注疏也鎬心異其事遂取讀數過既入試問題正出疏中鎬遂中選章伯益名友直郇公之族子也郇公嘗欲以郊恩奏補辭不願受皇祜中廷臣以文行論薦召試玉堂亦以疾辭時有詔太學石經廷臣復薦之伯益不得已遂至闕下畢除將作監簿伯益固辭朝廷知其不願仕亦不之強伯益書畫今皆名世惟詞章不多見焉歐陽公之父崇公與母韓國太夫人皆葬於沙溪瀧岡胥楊兩夫人之喪亦歸祔葬公辭政日屢乞豫章欲歸省墳墓竟不得請里中父老至今相傳云葬夫人時常指其山之中曰此處他日當葬老夫後葬於新鄭非公意也斫琴貴孫枝或謂桐本既伐旁有蘖者為孫枝或謂自本而岐者為子幹自子幹而岐者為孫枝凡桐遇伐去隨其萌蘖不三年可材矣而子自幹岐生者雖大不能拱把唐人有百衲琴雖未詳其取材然以百衲之意推之似謂衆材皆小綴葺乃成故意其取自子幹而岐生者為孫枝也孫枝既難得縱有非久藏未可用今人求之老屋間得其材當試於水中沒入數尺徐觀其浮取其浮者用之此亦古人遺意若僧寺木魚嵗年雖久而扣擊之餘聲𣪚質不足用也世寶雷琴鄉人董時亮蓄一琴以為雷氏舊物豫嘗見之顧莫能辨也紹興中偶一部使者聞之因願得以供上方時亮未許則借觀而固留之以白金五百兩為謝即日以獻內府辨之曰琴古且異以為雷琴則欺矣郤不納獻者念費之博返琴而索銀更謂時亮曰倘以為無虗辱則請留百金時亮聞之喜曰以琴歸我正所欲也銀何用為盡舉而復之封識尚存聞者莫不歎服時亮正上官至朝議大夫而家無生理後其子仕嶺表死不知今歸誰氏廣南風土不佳人多死於瘴癘其俗又好巫尚鬼疾病不進藥餌惟與巫祝從事至死而後已方書藥材未始見也景德中邵曄出為西帥兼領漕事始請於朝賜聖惠方與藥材之費以幸一路真宗皆從其請嵗給錢五百緡今每嵗夏至前漕臣製藥以賜一路之官吏蓋自曄始岐山西北十餘里有周公祠祠後山下泉湧出甘冽特異於他所人謂之潤德泉相傳云有大變則涸而不流崇寧中泉脈忽竭山下人浚而深之始得涓滴終不能復舊也興國富池廟碑神乃三國吳將甘寧也紹興初巨盜李成既渡江破江州欲入豫章大掠江西諸郡來禱於廟以決所向持環珓擲之幾及地忽躍起髙丈餘墜神所坐之後賊驚曰神不我與矣遂轉戰而之湖南江西不被李成之虐者皆神之賜也後郡守以聞於朝加封王爵敞大祠宇龕藏環珓而表之曰靈珓東坡水龍吟笛詞髙雲翔云後之箋釋者獨謂楚山修竹如雲是蘄州出笛竹至異材秀出於林表之語不知是東坡敘取材法也凡竹林生後長者必過前竹其不能過者多死一林內特一竹可材逺而望之或伐取數十百竿錯亂終不可識蔡雍仰視柯亭屋椽得竒材不待如此求之而雍後無至鑒獨有此法可求耳雲翔嘗赴禮部與仲兄及諸鄉人飲於酒肆有數老樂工相近談論音律雲翔微笑其人乃前致敬曰某輩大晟府舊人適有所談而諸學士發笑必某言不協理雲翔時既酒酣乃取其笛弄之諸工駭聽失色設拜而去次日詣雲翔之館求教雲翔辭之雲翔洞曉音律能移宫轉羽子弟朋友間無能授其法再舉不第而死雲翔名驤吉水人劉執中彛知虔州以其地近嶺下偏在東南陽氣多而節候偏其民多疫民俗不知醫信巫祈鬼乃集醫作正俗方專論傷寒之疾盡籍管下巫師得三千七百餘人勒之各授方一本以醫為業楚俗大抵尚巫若州郡皆倣執中此舉亦政術之一端也孔毅甫為舉子時嘗夢有五色線繫角黍來餽者毅甫食之既其年試於南宫遂中選大觀中士人李彪久留太學慷慨好直言覩時政之弊欲上書論其事蔡氏之黨知之乃密以告元長大怒付獄推治且謂開封尹曰李彪狂妄死有餘責人懼莫敢救者會張天覺代相應得從末減後元長復位欲竟其事遂流彪於海外獨醒雜志卷三
