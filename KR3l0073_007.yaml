body:
  text: 獨醒雜志卷七宋曽敏行撰南豐之曽曰鞏曰牟曰宰曰布曰肇章貢之曽曰弼曰懋曰班曰開曰幾皆以伯仲取科第致位通顯南豐之最著者子固子開而子宣遂登相位章貢之最著者叔夏天猷若吉甫雖晚遇亦終次對此二族蓋甲於江西也泉南之曽自丞相魯公一傳而有樞密孝寬再傳而為祕監誠三傳而為今丞相懷又曽氏之最著者也按千姓篇曽氏望出廬陵自孔門點參元西之後至漢才有尚書郎偉一人耳而江西之曽居廬陵尤多散在諸邑若太和若安福若何原若松江若睦陂𣲖别枝分不可盡紀豫家在吉水蓋自為一族六世之祖幼孤莫知族系之所自獨相傳以為自金陵而宜春而吉水而已江南龍君章野史列傳曽氏有諱崇範者廬陵人獻書李唐遂家金陵李氏歸朝而其子乃以喪歸則知曽氏自金陵歸廬陵初非自金陵徙廬陵也豫家有墳墓在贑之寧都疑與章貢之族通而自南豐來言者以為吉贑撫三郡本江西之一族亦未見譜牒莫可推尋然廬陵之族諱乾度者在本朝首舉進士終于卿監其諸族相繼登科無慮數十人視章貢南豐終無顯者睦陂之族如晦運幹諱彥明登宣和甲辰乙科與諸父相弟兄嘗言尚書之後歷及唐五六百年曽氏無聞人而本朝居相位登禁從者如是蓋本朝以火德興曽氏以火音合言雖附會未為無驗也涪陵譙定字天授幼學釋氏伊川之貶涪也始盡棄其學而學焉伊川教以中庸諸書多有穎悟後伊川得歸天授送至洛中而返靖炎間兵戈擾攘天授尚無恙一日忽棄家隱于青城山莫知所終方士為余言今或有見之山中者不知天授之年又幾何矣伊川嘗謂道家白日飛升之類則無若山林間保形練氣以延年益壽則有之審如是則天授誠不死矣許知可嘗夢有客來謁知可延見坐定客問知可曰汝平生可知恨乎知可曰我恨有三父母之死皆為醫者所誤今不及致菽水之養一也自束髮讀書而今年踰五十不得一官以立門户二也後嗣未立三也其人又曰亦有功於人乎知可曰某幼失怙恃以鄉無良醫某既長立因刻意方書期以活人建炎初真州城中疾癘大作某不以貧賤家至户到察脈觀色給藥付之其間有無歸者某輿置于家親為療治似有微功人頗相傳其人曰天政以此將命汝官及與汝子若父母則不可見矣因復取書一通示之知可略記其間語曰藥市收功陳樓間阻殿上呼盧喝六作五既覺異其事而不知其何祥也紹興二年策進士第六升作五乃在陳祖言樓材之間其年仍舉子始知夢中之言無不合知可名叔微真州人有普濟本事方今行于世祥符中汀人王捷有燒金之術因曽繪以見劉承圭承圭薦之王兾公遂得召見時人謂之王燒金捷能使人隨所思想一一有見人故惑之大抵皆南法以野狐涎與人食而如此其法以肉置小口罌中埋之野外狐見而欲食喙不得入饞涎流墮罌內漬入肉中乃取其肉曝為脯末而置人飲食間又聞以狐涎和水頮面即照見頭目變為異形今江鄉喫菜事魔者多有此術紹興六帥皆果毅忠勇視古名將嶽公飛獨後出而一時名聲幾冠諸公身死之日武昌之屯至十萬九百人皆一可以當百余嘗訪其士卒以為勤惰必分功過有别故能得人心異時嘗見其提兵征贑之固石洞軍行之地秋毫無擾至今父老語其名輒感泣焉蓋其每駐軍必自從十數騎周遭巡歷惟恐有一不如紀律者時禆將楊貴怒一卒擅離隊伍遂臠而尸之卒尚未死飛見之問其故以為不應死顧左右求其生不可則絶之而解衣以殮焉召貴詰曰擅離隊伍罪未至是汝當以死償之貴皇懼不敢對諸將羅拜祈免乃已猶以豫章境上有逋逃者責使招降焉不然復其罪貴後能致其人降始獲免方臘之變經制使陳公亨伯館先君於幕府時洪尚書光弼以南京國子博士被檄主餉事因與定交先君與尚書同年同月生故極友善冦平論功先君輔初官尚書遷京秩後更兵戈音問寖疏先君既勤王而歸即掃軌朝市尚書亦以使事見執於絶域者纍年而後歸卒莫能申敘先君每切恨歎方臘家有漆林之饒時蘇杭置造作局嵗下州縣徵漆千萬斤官吏科率無藝臘又為里胥縣令不許其雇募臘數𬒳困辱因不勝其憤聚衆作亂先誘殺縣令兵吏無與抗者遂陷睦州江浙亡命相率從之衆至數十萬是時天下晏安久州縣士卒皆不習于兵望風奔潰臘聲勢益張復陷婺歙等州乃入錢塘觀燈飲犒連日因遣人發掘蔡氏父祖墳墓露其骸骨加以唾罵王師既至相拒纍月不能少挫其鋒後臘以食少人衆勢稍窘促遂獨從千餘人入剡溪洞死拒不出童貫不能誰何乃命部將偽為朝廷招降者誘之以官既出則縶之父子皆檻送京師戮死于市餘黨遂平初臘之入杭也有太學生吕將者為之畫策以為不如直據金陵因傳檄盡下東南郡縣收其稅賦先立根本徐議攻取之計可以為百世之業若止於屠略城邑是乃盜爾臘不以為然曰吾家本中産無他意苐州縣徵斂無度故起兵願得賊臣而甘心耳先君嘗謂天下無叛民其或至于此者必有所不得已也童貫之討方臘也盡檄東南諸路兵凡數十萬貫獨總之既纍月無功朝廷頗加督責貫懼無以為計乃出令與賊戰而不能生獲者許斬首以獻亦議推賞輒欺者抵罪諸軍自後每出戰或夜劫賊寨凡力所能加者皆殺之以其首來貫即授賞不問其是賊與否也軍士因大為欺罔偶出遇往來人亦皆殺之因告其主將曰道逢賊衆因與鬭敵遂斬其首主將縱知其非亦不敢言陳公亨伯嘗見貫謂曰聞諸軍每戰多殺平民要須禁止貫不聽既而臘招降餘黨潰散軍士追奔或入民居全家殺之以其首獻貫欲張大其功亦不問也靖康改元冬十一月金人渡河朝廷下詔應天下方鎮郡縣各率師募衆勤王扞邊湖南帥郭公三益獨起民兵命縣宰各統所部犒勞甚厚時先君為永州東安簿零陵令丞不任事郡守二以先君易之會有是舉守以屬先君或勸曰邑固有令君獨何為先君揮之曰此豈臣子辭難之時即日治兵以行部署整肅一路莫能及既至淮甸聞京城失守蔡亳有叛卒肆剽于道路兵至是多引歸先君獨與二三公勒兵趨南京時光堯未即尊位留守乃朱丞相勝非其時官吏多逃散朝班無幾共表勸進乃築壇于州治儀門外東南隅上登壇受寶北向痛哭班立者無不感泣越日乃命勤王師罷歸官吏各推賞有差先君謂是行也勤勞有之功效則亡豈忍受賞既以兵歸零陵尚餘犒賞銀千兩悉上送官自舉兵至訖事文移數篋﨑嶇兵火毁失殆盡僅存印歷至勤王事止見之差出條耳衣冠南渡劉發運寧止來自真州治所舟行至新淦適遇敵騎一時行舟皆為所焚發運僅以身脫顧無所歸問之鄉之長者得外大父劉公儀仲徒步歸之外大父因授館且為收其散亡得一婢子衣槖三四吏卒十數舟焚餘其底尚得錢數百千時方俶擾雖山谷間一日亦四五驚卒有長吁于外者劉聞之詰曰天步方艱吾身不敢自愛爾曺乃嗟怨耶立命斬之先君時留外氏因與遊處先君少為治亂之學當崇觀間以䇿干當路輒不受逮浙江盜作諸公方思碩畫由是勉出為世用而志已倦遊矣劉一見先君以為偉人語及零陵勤玊始末歎曰世不無義士顧勇於義如君者人所未知耳邀與俱趨章貢隆祐在所先君辭以久出逺歸不忍復去親旁臨分謂先君曰觀君不樂仕進殆將隱矣後會無期因以駝裘識别而去先君既不復出而劉後為吏部侍郎不久亦罷卒不復相聞張孝純守太原金人攻城甚力孝純遣蠟丸求救者凡十有八朝廷初遣种師中往援師中兵敗于榆次復欲命李公伯紀為宣撫帥師救之伯紀辭以不知兵朝廷不許御史陳過庭率其屬陳公甫等言曰李綱儒者不習軍旅若師出再衄則太原失守遺憂近甸禍實不測非計之善也疏亦不報既而解濳等果失利孝純以糧盡城陷敵人長驅而來無復後顧矣胡文定公廷試考官初欲以魁多士繼以其引經皆古義不用王氏説降為第三人為荆南教官與楊龜山中立交承遂相與講學及為提學官與謝上蔡顯道從遊亦厚崇觀間嘗為太學官雖當時禁習元祐學術而公獨留意正蒙諸書與楊謝諸公通問不絶故紹興以來論伊洛之學者胡氏為得其傳而公嘗自謝遊楊三公皆義兼師友實尊信之公名安國字康侯有春秋解武夷集行于世劉尚書美中兄弟終鮮父大中極憐之大觀初貢于鄉將赴南宫試大中令一老僕從行至中塗尚書一夕忽暴病而死僕驚救甚至越半日未蘇逆旅主人皆勸之具棺斂僕曰我主翁子五六人死亡殆盡今惟此爾若又死則是無天地也且我何面歸見主翁於是以席藉地置尚書於上坐於其傍曰若是三日而不活則誠死矣越再夕尚書手足復動醫救數日疾平遂入京師次年中進士第獨醒雜志卷七
