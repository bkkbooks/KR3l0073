body:
  text: 獨醒雜志卷四宋曽敏行撰岳將軍既死部下多竒才時既寝兵稍稍引去有何宗者積功至脩武郎一日棄官竟入玉笥山結屋數椽於山之三㑹峯上盖樵牧所不至居五年徃来宫觀間與道流頗相善一日忽謂之曰来日我居菴作少事子来訪我則先撃石若菴中有聲相應則不湏来道流如其言數日後乃始訪之撃石數四寂無應者懼而退去又數日率衆再徃啓其户視之則何被髮而逝時方秋暑不知其死既㡬日而面貌如生亦可謂之不凡矣花光仁老作墨花陳去非與義題五絶句其一云含章􅉉下春風面造化功成秋兎毫意足不求顔色似前身相馬九方臯徽廟見而善之召對擢用畵因詩重人遂為此畵紹興初花光寺僧来居清江慧力寺士人楊補之譚逢原與之徃来遂得其傳補之所作後益超出格韻尤髙然觴次醉餘雖娼優墻壁皆為之他有求者徃徃作難逢原每不樂補之所為而墨花實不逮唯長於平逺遇志同道合者始為作之若以㳺藝請則牢辭固拒如不願聞故其畵亦不多見人亦不知其名也古者四時變新火今人茍簡家所用火不知何從来亦不計其嵗年也兒時在湖湘見一僧舍有長眀燈有神異其焰不熱試以指炙之信然後加考究凡道宫佛燈神祠中多置此燈有數年者焰青而昏徃徃皆不甚熱盖久則力盡爾今人但知擇水初亦非深知水味獨以清渾甘寒有易曉者如火齊烹餁氣熖着人與水功用一等茍不必變古人何苦多事汪彦章為豫章幕官一日㑹徐師川於南樓問師川曰作詩法門當如何入師川答曰即此席間杯棬果蔬使令以至目力所及皆詩也君但以意剪裁之馳驟約束觸𩔖而長皆當如人意切不可閉門合目作鐫空忘實之想也彦章領之逾月復見師川曰自受教後准此程度一字亦道不成師川喜謂之曰君此後當能詩矣故彦章每謂人曰某作詩句法得之師川豐中丞相之名稷紹聖間數任言責有正直之聲與章質夫友善而不樂章子厚與曽子固友善而不樂曽子宣其論子厚子宣章疏皆直指陳不少恕初不以質夫子固之故而為之掩覆也政和三年蔡京自杭州召還三入相矣時文柄多歸北司京求為固寵禄保富貴之計于是内興大沒外招强敵改定太宰少宰之制更立帝姬命姬之號欲絶天下之議已盡假御筆以行之孔經甫文仲為台州司户日范蜀公舉應制科經甫對䇿極言青苗免役之害語太忤直宋次道為初考以入三等王禹玉覆考降一等韓持國詳定從初考王荆公見而惡之宻啓於上以御批黜之遂下詔發還本任孫給事固封還制書極言其不可經甫將歸徃見蜀公公歎息其不遇經甫曰茍不負科目及公知人之鑒足矣不敢以窮逹為念也公甚壮之謂曰君氣節如此無替古人惟不替今日之志則某之所願也經甫元祐中為諫議大夫果以抗直為時所推重云孔經甫年六七嵗能作詩其父司封君甞對客召經甫侍立客命經甫為蓮實詩經甫立成記其一聨云一莖青竹初出水數箇黄蜂占作窠語雖未工而比𩔖親切客大竒之經甫自此知名毛公弼守泗州病泄痢乆不愈及罷官歸遂謁龎安常求醫安常診之曰此丹石毒作非痢也乃煮葵菜一釡令公弼食之且云當有所下眀日安常視之曰毒未去問食㡬何才進兩盂安常曰某煮此藥升合銖两自有制度不盡不可於是再煮强令進之已乃洞泄斕斑五色安常視之曰此丹毒也疾去矣但年髙久痢又乍去丹毒脚當弱不可復餌他藥因贈牛膝酒两缾飲盡遂强如初公弼有一女甞苦嘔吐亦就求醫安常與之藥曰嘔吐疾易愈但此女子能不嫁則此病不作若有娠而嘔作不可為矣公弼既還家以其女歸沙溪張氏年餘而孕果以嘔疾死世傳安常醫甚神余耳目所接如此所傳信不誣矣桞耆卿風流俊邁聞於一時既死葬於棗陽縣花山逺近之人每遇清眀日多載酒殽飲於耆卿墓側謂之弔桞㑹江州徳化縣楚城鄉乃陶淵眀所居之地也詩中所謂柴桑者宣和初部刺史即其地立陶淵眀祠洪芻駒甫為之記祠前横小溪溪中盤屹一石人謂淵眀醉石也土人遇重九日即携酒擷菊酹奠祠下嵗以為常里中有峻嶺號曰王嶺相傳彭玕反於吉州僣號稱王南唐遣兵征之彭玕數敗遂退保於此以死守余甞登嶺上可寘數萬人倉廩府庫皆有遺址至有一所曰相公坪足見玕之僣也旁有山視王嶺為卑小曰張欽寨以為南唐遣欽来討之駐兵其上玕有謀士曰劉守真挟邪能呼風喚雨故欽與戰輒不利距嶺三十里有山曰雲火峡玕之壠在焉後守真死欽復遣人發其先壠棺上有小赤虵虵兩旁有蟻運土為弓劍形既而玕敗今循驛道而上有劉仙堠其旁有劉仙師壇皆劉之遺跡土人遇旱禱於壇下間亦雨應湖湘巖竇中多石燕附石而生状如海物中瓦壠每天雨則迸出墮地采以入藥以左右顧分雌雄性大熱時有虞都廵者先君同僚也自言服之其法每取雄者十枚煅之以火透紅則出而漬酒中候冷復煅既煅復漬如是者無筭度乾酒一升乃取屑之每早作以二錢七擦齒潄嚥以酒虞時年五十服此藥二年膚髪甚澤纔如三十許人自謂服藥之功一日忽􅁴熱氣貫两目睛突出痛不堪忍而死因思人服金石藥鮮有不為其所毒者零􅁜淡山有石巖中空可容千人東南有石忩眺望甚逺相傳以為其地宜淡竹而山因得名或云舊有淡姓人居之故曰淡山秦時有𨼆者曰周貞實甞𨼆於巖中始皇好神仙方士或薦貞實始皇召之使凡三徃貞實不起遂化為石巖去州二十餘里傍有寺觀徃来者無虚日土人謂巖之幽勝當與浯溪朝陽等元次山居是邦而獨無品題甚可怪也山谷謫宜州時甞至巖下今其詩之卒章曰惜哉次山世未顯不得雄文鑱翠珉盖紀永人之語神宗甞對執政言吕誨墓誌是司馬光撰劉航書航亦無所顧忌耶韓絳子華不知上意因觧曰航約許光為書石後欲悔之而不敢食言亦甚恐懼也上曰茍恐懼則不為書矣子華不能對王荆公退居金􅁜一日與門人山行少憇松下公忽囬顧周穜曰司馬十二君子人也穜黙不對公復前行言之再四人莫知其意公此時豈深悔為恵卿軰所誤耶東坡自恵􅁶儋耳子由自筠􅁶海康二公相遇於藤因同行將至雷之境郡守張逢以書通殷勤逮至郡延入館舎禮遇有加東坡將渡海逢出送於郊復出官錢僦居以館子由帥臣段聞之大怒劾逢館留黨人蘓軾及為蘓轍賃屋等事逢坐除名勒停子由移循州東坡知貢舉時得章貢孫勰之文於黜籍中見而異之擢置第五榜帖既𫝊誹議藉藉以勰嘗游公之門也㑹廷試勰復中第五輿論始服文章之定價勰即坡公所贈剛說孫介夫之子也政和間置大晟樂府建立長屬時晁冲之叔用作梅詞以見蔡攸攸持以白其父曰今日於樂府中得一人元長覧之即除大晟丞詞中云無情燕子怕春寒常失佳期惟有南来塞鴈年年長占開時以為燕鴈與梅不相闗而挽入用之故見筆力趙諗元祐九年擢進士第二名時第一名畢漸當時榜帖偶然脫去漸字旁㸃水天下遂傳名云畢斬趙諗諗後謀不􅁤伏誅果符其䜟何仙姑永州民女子也因放牧野中遇人啗以棗因遂絶粒而能前知人事獨居一閣徃来士大夫率致敬焉狄武襄征南儂出永州以兵事問之對曰公必不見賊賊大敗智髙遁走入大理國其言有證𩔖如此閣中有遺像常徃觀之融州守陸濟子楫遺黄鋼劍且云惟融人能作之盖子楫未詳黄鋼之說矣予甞居湘時見徭人嵗来謁象廟各佩一刀乃所謂黄鋼者惟諸蠻能作之其俗舉子姻族来勞視者各持鐡投其家水中逮子長授室大具牛酒㑹其所甞徃来者出鐡百鍊盡其鐡以取精鋼具一刀不使有銖兩之羡故其初偶得鐡多者刀成銛利絶世一揮能㫁牛腰其次亦非漢人所能作終身寳佩之漢人願得者非殺之不能取也徃徃旁郡多作贗者予甞訪之老冶謂之到鋼言精鍊之所到也今人纔以生熟二鐡雜和為鋼何錬之有融劍殆是耶東坡坐詔獄御史上其寄黄門之詩神宗見之即薄其罪謫居黄州鄭介夫既下吏獄官得介夫所厚者徃還詩文悉以奏聞上見晏叔原所續絶句亦従而釋之神宗愛人才不忍終棄如此晏詩有云小白長紅又滿枝築毬塲外獨支頤春風自是人間客主掌繁華得㡬時曺子建七啟云寒芳蓮之巢龜鱠西海之飛鱗注云今之􅙰寒也古樂府名都篇亦有寒鼈炙熊蹯之句因知今人食品有所謂蒸汗假鼈者夫豈承其舛而訛其語耶琵琶詞緑頭鴨云路漫漫漢妃出塞夜悄悄商婦移船徐師川云非是當云路漫漫漢妃馬上夜悄悄商婦江邉出塞愁思移船感恨廼當時語王荆公作字說一日躊躇徘徊若有所思而不得子婦􅆘侍見因請其故公曰解飛字未得婦曰鳥反爪而升也公以為然天聖中毛應佺守竇州朝廷賜慮囚勅書云勅毛應佺朕念三聖之愛育蒸黔垂著典法申戒官吏簡恤刑章深切丁寕斯為至矣方郡守長如能刻意遵奉與我共此何患不臻於訟息而治平哉今歊燠戒時動植咸茂而圜墻幽圄猶有繋縲愀然以思當食興歎汝宜體是憂惻加于撫循無使狴犴之間重有淪胥之困躬勤省察稱朕意焉敕書到日汝可速指揮泥餙洒掃獄房甞湏净潔每五日一度差人就獄内監逐人力刷盪枷杻及逐日供給水漿兼罪人内如有疾病者立便差人㸔承醫療其委無骨肉者支與喫食有人供送茶飯者亦湏盡時轉送不得邀難减尅無使罪人或至饑渇所有合歸法者候處斷之時給與酒飯如小可罪犯便湏逐旋决遣若是大段刑禁事關人命亦湏盡理速行勘斷不待淹延仍􅄆下管内汝宜常切提舉無令曠慢及候依此逐件施行訖聞奏故茲示諭想宜知悉夏熱汝比好否遣書指不多及又有賜衣勅書云勅毛應佺汝外分憂寄善布化條眷言守土之良􅆘及頒裘之候特申渥賜用洽朝儀今賜汝紫乾色大綾綿旋襕衫一領至可領也故茲示諭想宜知悉冬寒汝比好否遣書指不多及時應佺官止太子中舎祖宗重郡守之寄雖逺方小郡勅書亦宜徧賜今帥守皆無之不知是何時廢也獨醒雜志卷四
