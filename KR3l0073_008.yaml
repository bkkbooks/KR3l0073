body:
  text: 獨醒雜志卷八宋曽敏行撰歐陽在政府日臺官以閨閫誣訕之公上章力乞辨明神宗手詔賜公曰春寒安否前事朕已累次親批出詰問因依從來要卿知又詔曰春暖久不相見安否數日來以言者汚卿以大惡朕曉夕在懐未嘗舒釋故累次批出再三詰問其從來事狀訖無以報前日見卿文字要辨明遂自引過今日以令降出仍出榜朝堂使中外知其虚妄事理既明人疑亦塞卿直起視事如初毋恤前言又塗去塞字改作釋字宸翰今藏公家董侍郎敦逸仕于朝招一鄉人在太學者訓其諸子暇日課其習業不加進侍郎責之曰吾年二十八入學甘虀鹽者凡㡬載僅得一第今汝若此何以有成耶鄉人曰公言過矣侍即乃董十郎兒賢郎董侍郎兒其好學之心自不侔矣侍郎之父行第十其人故云建炎三年偽四太子入金陵府官相率迎降獨通判廬陵楊公邦義毅然不屈先自書其衣裾曰寧為趙氏鬼不作他邦臣以授其僕曰吾即死矣其大帥有張太師者置酒召公立庭下以紙書死活二字使示公曰無多言欲不降書死字下若歸于我書活字下公視吏有傍簪筆者即奪筆書死字下張知其不可屈命引去又數日囚公以見四太子公大罵不絶口四太子怒甚殺之剖其腹取其心明年白其事于朝褒錄死節初贈直秘閣繼又贈次對諡忠襄賜官田官其諸子令立廟于金陵贈告云懦夫貪生名不稱于沒世烈士砥節死有重于泰山汝禀性剛方值時艱危介胄之士望風而速奔城郭之臣蒙恥以求活獨汝能明事君之義抗死節之忠誓不屈于敵庭寧自甘于血刃口不絶詈言不忍聞綽有張御史之風無愧顔常山之節肆頒恩典庸慰忠魂粲然閣直之華昭哉廟食之逺併推寵秩以及遺孤非止往居之榮實是臣工之勸尚祈不昧知享此哉歐陽全美名珣廬陵人登崇寧進士第靖康初全美調官京師時金人欲求三鎮全美行次闗山以樂府寄其内曰鴈字成行角聲悲送無端又作長安夢青衫小帽這回來安仁兩鬢秋霜重孤館殘燈小樓鐘動馬蹄踏破前村凍平生牽繋為浮名名垂萬古知何用全美至京有詔許上封事論禦戎之䇿全美應詔陳利害時有九人同召對全美奏曰割地彼亦來不割亦來特遲速有間今日之䇿惟有戰耳時宰執有主棄地之議者不悦即除將作監丞使金竟不復還朝廷錄其節而官其壻乃從兄叔謙也叔謙為余言紹興十一年夏客臨安一日有客垢衣破笈若逺至者來同邸即一室閉之遽詣尚書省自言明日召見已而命之官後詢其人姓李名微卲武人是時尚書洪公留絶域得皇太后書遂遣微以蠟丸致之上得書大喜謂侍臣曰朕不得皇太后安問且十五年雖遣使百輩不如此一書遂命微以官尚書公以使命見執於金其間邅罹危辱者屢矣而能仗漢節誓死不變間闗萬里遣致皇太后書以寛天子孝思可不為忠乎李忠愍公若水為大名府元城縣尉日有村民持書一封公得書讀竟即火之詰其人何所從來對曰夜夢金甲將軍告某曰汝來日往縣西逢着鐡冠道士索取闗大王書下與李縣尉既而如夢中所見故不敢隱公以其事涉詭怪遂縱其人弗治因作絶句記之曰金甲將軍𫝊好夢鐡冠道士寄新書我與雲長隔異代翻疑此事太空虛公初以書付火之時母妻子弟驚訝求觀弗獲獨見其末曰靖康禍有端公卒踐之之語其後二聖北狩公抗節金營將死而口不絶罵則知天生忠義為神物者已預知其先矣國家初與金人結好遣馬政自登州泛海而往歸朝廷復選其子擴為使宣和末金人敗盟舉兵入冦擴尚以使事留金後得脫歸未至太原而金人已長驅南下矣擴乃舎使事說童貫願招集忠勇以遏其鋒貫許之擴過眞定時劉公韐為帥公以擴屢使于金知其情偽心頗疑之遂留不遣一日擴潛遣一卒之保州為邏者所獲劉公益疑而未有所處也公之子子羽謂公曰馬擴首尾計議邊事不以虛實告朝廷遂使戎馬深入震驚京師且復潛遣兵士為保心腹不若聲其罪而誅之庶絶後患公以為然遂召擴立于庭下責其誤國令拽出斬之擴呌呼不服乃以付獄推治未㡬劉公召還金人䧟真定擴得免死契丹為金人攻擊窮蹙無計蕭后遣其臣韓昉來見童貫蔡攸于軍中願除歳幣復結和親且言金人本遠小部落貪婪無厭蠶食旁近五六十國今若大遼不存則必為南朝憂唇亡齒寒不可不慮貫與攸叱出之昉大言于庭曰遼宋結好百年誓書具存汝能欺國獨能欺天耶昉去貫亦不以聞于朝遼既亡金人果背約靖康初召种師道赴京師才入國門即日引見上殿淵聖起迎之曰朕久望卿來何其遲也塗中䟦涉不易師道謝畢上賜坐問曰國步多艱敵人深入卿何以禦之師道曰兵事難預料容臣登城觀其勢如何却得奏聞但彼若在三十里外頓砦則難退如逼近則易耳明日金移軍三十里外師道因得於城上修飭備禦之具金屢進攻皆却遂結盟解圍而去師道其初所言蓋知有間諜欲誤之爾金人果中其計但禁庭宻議不知何從知也朝廷之召种師道也使者促之項背相望師道老矣或勸之弗行師道謂其子曰朝廷近來議論不一吾縱有謀畫未必得用然世受國恩今而辭難天地且不容我矣遂隨詔使日夜疾馳至闕下畫䇿以退金人頼少安金兵北還師道請邀擊之李邦彦等不許師道謂何桌日人人曰敵深入吾地止邀金帛而還彼非惟懼春深死傷士馬蓋慮三鎮之議其後也吾觀彼釁未巳今既不用吾計吾不復言然竊料敵必再來要當先為之備也朝廷不聽其冬金人果再犯京師京師戒嚴金人發礮攻城甚力有獻策欲結索網以障之其人歸自太原圍城中具見張孝純王禀等設此而礮無所施朝廷反以為迂不肯試一為之蓋不知吳越將孫琰守蘇州城嘗用此拒礮而淮南不能攻時號為孫百計也崇寧四年中書奉行御筆時蔡京欲行其私意恐三省臺諫多有駁難故請直以御筆付有司其或阻格則以違制罪之自是中外事無大小惟其意之所欲不復敢有異議者祖宗以來凡軍國大事三省樞宻院議定面奏畫㫖差除官吏宰相以熟狀進入畫可始下中書迨命下審讀或有未當中書則舎人封繳之門下則給事封駁之尚書方得奉行猶恐未愜輿議則又許侍從論思臺諫奏劾自御筆既行三省臺諫官無所舉職但摘紙尾書姓名而已大觀中吳執中子權為御史上言乞遵祖宗成憲不許直牒差官及論輕賜予以蠧邦用捐爵禄以市私恩等事蔡京以少保致仕何給事昌言封駁麻制乞以罪狀宣布四方時人以為盛事何忠孺昌言新淦人紹聖四年進士第一徽宗朝累遷為給事中張商英罷蔡京復用遂以散官出閒居十有餘年物論歸之淵聖即位復召用除兵部侍郎太子詹事未㡬金人再犯京師二聖北狩太子諸王宰職侍從皆從而昌言逃匿太子宫溝中偶得不行張邦昌僭號因更其名及隆祐垂簾始欲復舊而人言已不可掩恚憤成疾而死李仲謙大有新喻人靖康初為贑守京城戒嚴即調贑卒勤王諸郡以承平之久士卒懵不知兵及當調發間有冠葛巾扶杖而行者觀者莫不竊笑惟贑卒獨勇銳器械亦精明仲謙號令整肅師行秋毫無犯人謂仲謙既知兵而贑卒亦閑習紀律度必可用及至京師亦無及矣仲謙紹興初嘗立朝即上書言兵事以為用兵當有機有權明於此而后可以决勝光堯皇帝覽之大喜即降付中書時趙元鎮丞相當國一日奏事畢上謂丞相曰李大有書涉兵機故不欲付外看詳昔張齊賢上取河東之䇿太祖裂其奏擲之於地及左右既退乃取其奏歸以授太宗曰他日取河東當用齊賢䇿太宗後平河東用齊賢為相二祖沉㡬先物朕當以為法觀聖語如此則將大用之矣未㡬而歿終於檢正紹興戊午冬奉使王倫與金使來和欲天子受偽詔國論未定朝士無敢言者胡邦衡銓時為樞宻院編修官上書請羈留金使斬主議者之首以謝天下語大憤直上怒其訐將禠官竄昭州時御史中丞鄭剛中諫議大夫李誼吏部尚書晏敦復户部侍郎李彌遜向子諲禮部侍郎曽開張九成入對便坐引救甚力時丞相秦檜參政孫近亦廹于公論請從臺諫侍從議謫廣州監鹽倉御史再以為言乃以為福州簽判云胡邦衡自福唐貶新州王民瞻以詩送之有曰百辟動容觀奏牘㡬人囘首愧朝班又曰癡兒不了公家事男子要為天下竒民瞻安福人名庭珪登科嘗為茶陵縣丞累年不調居鄉里以詩名家二詩既𫝊或以為訕由是亦坐謫辰州邦衡在新州偶有萬古嗟無盡千生笑有窮之句新守亦訐其詩云無盡指宰相張天覺在儋耳其後邦衡還朝嘗以詩人薦民瞻凡再召見初除國子監簿後除直敷文閣終於家禪家合衆而不譁無怒而有制執事者不辭其勞居安者不愧其逸入其門升其堂整整截截動有條理明道先生嘗見其㑹食因歎以為得三代之禮樂吾人族姻並居同室未必如其衆多而不能若是之整肅者往往女子童穉實始之此禪家所以屏妻絶子也盧文紀與崔恊不平協子舉進士文紀謂知貢舉王延曰吾嘗譽子于朝今子歴仕當求實効無取虛名昔越人善泅其子方晬其母浮之水上人怪之對曰其父善泅其子必能之若是可乎延退而笑曰盧公之言謂崔恊也恨其父遂及其子也明年選恊子頎甲科人以為公舉異時公卿有以子孫魁天下者其父祖蓋自謂善泅者也使延為主司吾知其與選頎者反矣予嘗𫝊登瀛圖本規模布置氣象曠雅每思創始者必非俗筆又有石本皆書名氏後有李丞相伯紀贊䟦乃欽廟在東宫得閻立本此畵親為題識以賜詹事李詩二本絶不同嘗見鄭昺彦明所賦長句云閻公十八學士圖當時妙筆分錙銖惜哉名姓不題别但可以意推形模十二匹馬一匹驢五士無馬應直廬五鞍施狨乃禁從長孫房杜王魏徒一人醉起小史扶一人欠伸若挽弧一人觀鵝憑欄立一人運筆無乃虞樹下樂工鳴瑟竽八士環列按四隅笑談散漫若飲徹盤盂杯勺一物無坐中題筆清而癯似是率更閒論書其中一着道士服又一道士倚枯株三人傍樹各相語一人繫帶行徐徐後有一人豐而鬍獨吟芭蕉立踟蹰一時登瀛客若是貞觀治効真不誣書林我曽昔曳𥚑三局腕脫㡬百儒雄文大筆亦何有餐錢但日糜公㕑邦家治亂一無𥙷正論出口邅非辜時危玉石一焚掃覽畫思古為嗟吁攷其所序列意鄭必為畫本賦之然長孫王魏元不在其中不知鄭詩何為及之耶按翰林盛事記開元中張燕公等十八人為集賢學士於東都含象亭圖寫其貌意二本必居其一而後人皆以為貞觀學士耳今人製陶硯惟武昌萬道人所製以為極精余初未信也廬陵有劉生者自言𫝊萬之法然最工者不能十年輙敗至有三五年遂刓泐不可用者余頃因歉嵗有野人持一風字様求售易以斗米滌濯視之亦陶硯也其底有萬字篆文意其為萬所製用之今餘三十年受墨如初雖髙要歙溪之佳石不是過也聞武昌今尚有製者乃萬之後里中士人胡卓明父祖好棋挾此藝者日至其母夜卧忽驚起問其故云夢吞一枯棋也初意日所嘗見是以形於夢寐已而生卓明年至七八嵗厥祖與客對奕而敗卓明忽從傍指曰公公誤此一着耳其祖敗而不平怒謂曰小子何知推局付之卓明布數着果勝厥祖大驚因與對棊其布置初若無法度既合則皆是數日間遽能與厥祖為敵迨十餘嵗遂以棊名四方之挾藝者纔爭先耳往嵗有客以棊求見朋友因共招卓明與較之卓明連勝客曰胡秀才野戰自得而某以教習不離規模是以不勝凡學書當先學偏旁上下左右與其近似者皆不相逺熟一偏旁則數十字易作矣凡作字宜和墨調筆使毫墨相受燥潤適宜厚墨則藏鋒紙平身正腕定指固則結字有凖矣廬山王元甫有詩名隱居山中不與士大夫相接東坡自嶺南歸過九江因道士胡洞微欲求見之元甫辭曰吾不見士大夫五十年矣不用復從賔贊幸為我謝之東坡歎賞而退劉尚書美中嘗夜夢與一方士談禪往復辨論宗乗中事甚詳因問之曰仙家亦談佛耶方士曰仙佛雖二理豈有二哉美中既悟頗異其事遂紀之以詩云北風吹雲肅天宇蕙帳寒生月當户頺然就枕睡思濃夢魂悠悠迷處所仙居勝士肯見臨促席從容欵陪語自言本事清靈君學佛求仙兩無阻雲軿白日降瑶空天衣飄飄就輕舉方諸宫深雲海濶金碧禪房隔烟雨與君粗有香火緣聊復東來相勞苦方游崑閬還無期君住世間須善為塵勞足厭何足厭等是實相夫何疑前身似是塵外人端為世緣縻此身重聞妙語發深省苦更離塵佛亦塵方平羽節何時來道宫佛殿隨塵埃未須苦說揚塵事東海波聲政似雷美中以為詩中皆紀其問答之語故盡錄之董體仁之祖名扆生前嘗目卜地以為壽藏既死而其子易之將塟扶䕶適過其地柩忽重不可舉子始驚異因欲就葬掘地丈餘忽遇大石其上有扆字乃其名也人益信其不偶獨醒雜志卷八
