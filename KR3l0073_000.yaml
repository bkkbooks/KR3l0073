body:
  text: 獨醒雜志小説家類一雜事之屬提要臣等謹案獨醒雜志十卷宋曽敏行撰敏行字達臣自號浮雲居士又曰獨醒道人又曰歸愚老人吉水人吉水屬廬陵郡故又自題曰廬陵曾祖孝先祖君彥皆當熙寧之時不肯以新學干科第故敏行守其家法多與正士遊胡銓楊萬里謝諤皆其友也年甫二十以病廢不能仕進遂専意學問積所聞見成此書其子三聘編為十卷以樊仁逺所作行狀及銓所作哀詞附後萬里序之諤跋之後趙汝愚周必大樓鑰亦皆為之跋書中多記兩宋軼聞可補史傳之闕間及雜事亦足廣見聞於南渡後劉嶽諸將皆深相推挹而于秦檜則惟記與翟汝文詬爭一事亦不甚置是非于秦熺登第一事亦僅借崔頎以寓之考敏行卒於淳熙二年去檜未逺殆猶有所避歟書中稱風鳶造自韓信而不言所據案唐李冘獨異志載有是説小説妄談于古無徵又唐改正月晦日為中和節載於鄴侯家傳當時嘗以命題試士其詩載於文苑英華本非僻事而試官謬舉清明寒食之説敏行亦不能糾正蓋以記録為主不以考證為主也如仁宗朝二衛士論貴賤事乃因朝野僉載唐魏徵事而影撰按此事先載能改齋漫録中賓退録嘗辨之京師知術者埋金事乃因國史補遺晉隗照事影撰見太平廣記二百十六卷敏行皆不辨而述之又蔡絛勒亭乃為其兄攸所軋見宋史蔡京傳而云以西清詩話為言者所劾偽吕洞賓詩乃福州黃待聘所撰當時已捕斬于馬行街見耿延禧林靈素傳按此傳載賓退録第一卷而云真有洞賓現化事尤失之不考至于欲以人挽獨輪車為陳尤如兒戲其謬更甚于房琯楊萬里序乃盛稱之可謂舍所長而譽所短矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀獨醒雜志原序古者有亡書無亡言南人之言孔子取之夏諺之言晏子誦焉而孔子非南人晏子非夏人也南北異地夏周殊時而其言猶傳未必垂之䇿書也口傳焉而已矣故秦人之火能及漆簡而不能及伏生之口然則言與書孰堅乎哉雖然言則堅矣而言者有存亡也言者亡則言亦有時而不堅也書又可廢乎書存則人誦人誦則言存言存則書可亡而不亡矣書與言其交相存者歟廬陵浮雲居士曽達臣少刻意於問學慨然有志於當時非素隱者也嘗與當世之士商略古今文章前代之豪傑知光武不任功臣而知其有大事得論諌知武侯終身無成而知司馬仲達實非其對知鄧禹之師無敵而知其短於取衆知孫權之兵不勤逺略而知其度力之所能若夫以兵車為活城以紙鳶為本於兵器談者初笑之中折之卒服之古之人固有生不用於時而沒則有傳於後夫豈必皆以功名之焯著哉一行之淑一言之臧而傳者多矣其不傳亦不少也豈有司之者歟抑有幸不幸歟抑其後世之傳不傳亦如當時之用不用皆出於適然歟是未可知也若達臣之志而不用世是可歎也既不用世豈遂不傳世歟達臣既沒吾得其書所謂獨醒雜志十卷於其子三聘蓋人物之淑慝議論之豫奪事功之成敗其載之無諛筆也下至謔浪之語細瑣之彚可喜可笑可駭可悲咸在焉是皆近世賢士大夫之言或州里故老之所傳也蓋有豫之所見聞者矣亦有豫之所不知者矣以豫所見聞者無不信之豫之所不知者無不信也後之覽者豈無取於此書乎淳熙乙巳十月十七日誠齋野客楊萬里序
