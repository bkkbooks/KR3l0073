  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0073_WYG_001-1a, image: WYG1039/WYG1039-0526a.png}
body:
  text: 獨醒雜志卷一宋曽敏行撰蔡端明事母至孝常步行遇一嫗貌甚龍鍾問其年曰百單二矣端明再拜曰願吾母之夀如嫗後果符其言包孝肅公尹京人莫敢犯者一日閭巷火作救焚方急有無賴子相約乘變調公亟走聲喏於前曰取水於甜水巷耶於苦水巷耶公弗省亟命斬之由是人益畏服向文簡公為廬陵倅時人未有知者安城士人彭仲元能以星厯知人禍福文簡召問之仲元曰通判不必他問不出十年位至公相文簡自廬陵罷官閲數年即大拜仲元之術不吝於告人吉凶夀夭不差毫髮時人即之者如市後官於京師而卒惜其術無傳焉皇祜元年何正臣與毛君卿俱以七嵗應童子科君卿之慧差不及正臣時皇嗣尚未生上見二人年甚幼而頴悟過人特愛之留居禁中數日正臣能作大字宫人有以裙帶求書者正臣書曰關睢后妃之德也上嘗以梨一顆令二人分食之君卿逡巡不應上怪問其故對曰父母在上不敢分離上大喜以為皆能知其大義翌日御便殿俱賜童子出身正臣字君表新淦洲上人後仕至寶文閣待制君卿字公弼吉水龍城人終於朝散大夫劉丞相名景𢎞南唐時為吉州牙將刺史彭玕以吉州叛攻陷郡縣殺略吏民脅景𢎞以從景𢎞度勢不敵乃佯許之隨之往來故吉之城邑獨不被殘毁玕既敗景𢎞以兵歸南唐遂家吉之永新縣嘗謂人曰我偽從彭玕之脅可活萬人吾雖不偶於時後必有興者因號所居後山曰後隆景𢎞既沒越三世而生丞相沆沆之子孫皆榮顯至今世祿不絶楊文公大年美鬚髯一日早朝罷至都堂丁晉公時在政府戲謂之曰內翰拜時鬚掃地公應聲曰相公坐處幕漫天晉公知其譏已而喜其敏捷大稱賞之天禧末冦公諸人皆貶逺方文公實預謀而晉公愛其才終不忍害也蔡元長嘗論薦毛友龍召對上問曰龍者君之象卿何以得而友之友龍不能對遂不稱旨退語元長元長曰是不難對何不曰堯舜在上臣願與夔龍為友他日再薦之復召對上問大晟樂友龍曰訛上不諭其何謂也已而元長入見上以問答語之對曰江南人喚和為訛友龍謂大晟樂主和爾上頷之友龍乃得美除劉丞相沆仲之守陳州時嘗夢登譙樓抱鼓而寢既覺家人告曰夜漏不聞四鼓何也明日丞相問故更吏對曰夜將四鼓有蜈蚣長三尺許旋辟鼓上惴恐莫敢近遂不報四更丞相因悟昨夢乃不之責此與歐陽公聞榆莢香而悟身為鸜鵒者何異劉偉明少以才學自負擢髙第中詞科意氣自得下視同輩紹聖初因遊一禪剎時東坡謫嶺南道廬陵亦來遊因相遇互問爵里姓氏偉明遽對曰廬陵劉弇蓋偉明初不知其為東坡自謂名不下人欲以折服之也乃復問東坡所從來公徐應曰罪人蘇軾偉明始大驚逡巡致敬曰不意乃見所畏東坡亦嘉其才氣相與劇談而去江南呼蜜為蜂糖蓋避楊行密名也行密在時能以恩信結人身死之日國人皆為之流涕余里中有寺僧曰南華藏楊李二氏稅帖今尚無恙豫觀行密時所徴産錢較之李氏輕數倍故老相傳云煜在位時縱侈無度故增賦至是歐陽謂行密為盜亦有道豈非以其寬厚愛人乎祖宗時堂吏官止朝請郎蔡元長為相多更改祖宗制度恐其議已遂許至中奉大夫宣和間朝奉大夫以上至中奉大夫者凡五十餘人雖有詔汰之而不能復舊至今遂為定制王冀公新喻人微時往觀社求祭肉衆問爾為誰曰我秀才也衆曰何所能曰能詩時無紙筆即取炭畫豬皮上曰龍帶晚煙歸洞府鴈拖秋色入衡陽後之人謂此句有宰相氣象汪聖錫幼年與羣兒聚學有謁其師因問能對者師指聖錫客因舉對云馬蹄踏破青青草聖錫應聲曰龍爪拏開淡淡雲客大驚曰子有魁天下之志聖錫年未冠果廷試第一李仁甫通鑑長編仁宗皇帝紀景祐二年三月丁巳賜故鎮東軍節推毛洵家帛五十匹米五十斛洵吉州人進士及第又中書判拔萃科其父國子博士應佺與其母卒於竇州洵徒跣護葬歸里中負土成墳毁瘠而卒時惜之即豫同里毛子仁父子也應佺與洵墓銘皆余襄公靖所撰應佺字子真罷竇州回尚歷虔太平三州通判以明道二年三月丁丑終於當塗官署其配髙氏壽春縣君終於池陽之舟次子溥以毁卒故余公銘之有曰哀殞庭蘭悲摧舞與兄漸奉喪歸葬於華原結廬墓所凡二十一月毁瘠如初喪之儀輿疾歸家數日而卒郡以孝行聞詔賜粟帛以旌顯之則子真非卒於竇州意者仁甫未嘗考余公墓銘耳天聖八年應書判拔萃科者凡八人仁宗皇帝御崇政殿試之中選者六人余襄公尹師魯毛子仁李惇裕其二則失其姓名問題十通一問戊不學孫吳丁詰之曰顧方略何如耳二問丙為令長無治聲丁言其非百里才壬曰君子不器豈以大小為異哉三問私有甲弩乃首云止矟一張輕重不同若為科處四問丁出見癸縲繫於路解左驂贖之歸不謝而入癸請絶五問甲與乙隔水將戰有司請待其未半濟而擊之甲曰不可及陳甲大敗或讓之甲不服六問應受復除而不給不應受而給者及其小徭役者各當何罪七問乙用牛釁鐘牽過堂下見其觳觫以羊易之或謂之曰見牛不見羊八問官物有印封不請所由官司而主典擅開者合當何罪九問庚請復鄉飲酒之禮辛曰古禮不相沿襲庚曰澄源則流清十問死罪囚家無周親上請敕許充侍若逢恩赦合免死否時襄公除將作監丞知海陽縣師魯武勝軍掌書記知河陽縣子仁鎮東軍推官知宣城縣惇裕大理寺丞知華亭縣皆以民事試之也毛子仁博學能文年十九登進士二十六中書判拔萃時譽翕然陳恭公余襄公杜祁公王伯中胥安道李獻臣王總之十二人各為詩以餞其歸杜公詩有曰判就十題彰敏妙學窮千古見兼詼其推重如此子仁孝於其親初為撫州司法以飬親在逺丐罷後知宣城縣丁父憂哀哭毁成疾前死之夕夢一綘袍童子持玉函中有丹書謂子仁曰帝命召汝使掌文籍覺而異之次日疾甚自謂必不能起援筆為贊曰生為幻人死為天真改幻為真無根無塵書畢而逝故事進士第一人初命官以將作監丞遷著作郎次遷右正言熙寧中許沖元將以磨勘當遷王荆公為相欲抑甲科三名前恩例擬令轉太常博士太常博士與右正言同為一等然祖宗分品流品以太常博士為有出身人遷轉非以待第一人也荆公方下筆作太字時堂吏以手約筆具陳祖宗之制荆公乃改太字右筆作口字沖元遂遷右正言李氏建國國中無馬嵗與劉鋹市易太祖既下嶺南市易遂罷馬益艱得惟每嵗入貢得賜馬百餘匹耳朝廷未悉其所有無也王師南伐煜遣兵出戰騎兵才三百至瓜州盡為曺彬之禆將所獲驗其馬尚有印文然後知其為朝廷所賜也王荆公詩經義成書神宗令以進呈閲其序篇未畢謂荆公曰卿謂朕比得文王朕不敢當也公曰陛下進德不倦從諌弗咈於文王何愧上曰詩稱陟降庭止之類豈朕所能公曰人皆可以為堯舜陛下何自謙如此上搖首曰不若改之廬山圎通寺在馬耳峯下江右之名剎也南唐時賜田千頃其徒數百衆養之極其豐厚王師渡江寺僧相率為前鋒以抗未幾金陵城陷其衆乃遁去使李煜愛民如僧則其民亦皆知報國矣馬正惠公珍其所藏戴嵩鬭牛圖暇日展曝於廳前有輸租氓見而竊笑公疑之問其故對曰農非知畫乃識真牛方其鬭時夾尾於髀間雖壯夫膂力不能出之此圖皆舉其尾似不類矣公為之歎服謝民師名舉廉新塗人博學工詞章逺從之者嘗數百人民師於其家置講席每日登座講書一通既畢諸生各以所疑來問民師隨問應答未嘗少倦日辦時果兩盤講罷諸生啜食果而退東坡自嶺南歸民師袖書及舊作遮謁東坡覽之大見稱賞謂民師曰子之文正如上等紫磨黃金須還子十七貫五百遂留語終日民師著作極多今其族摘坡語名曰上金集者蓋其一也嘗有藁本數册在其壻陳良器處豫少從良器學屢獲覩焉王文康公晦叔性嚴毅見僚屬未嘗解顔知河南日梅聖俞時為縣主簿一日袖所為詩文呈公公覽畢次日對坐客謂聖俞曰子之詩有晉宋遺風自杜子美沒後二百餘年不見此作由是禮貌有加不以尋常待聖俞矣元祐初后山在京師聞徐仲車之孝行遂致書以通殷勤託其門人江季共端禮持以往季共見仲車言曰友人陳師道好賢樂善介然不羣於流俗聞先生之風因願納交於下執有書記端禮以致於左右公欣然發緘讀己謂季共曰陳君真賢者某雖未之見子謂不羣於流俗今讀其書辭敢以為信然某年來未嘗以詩文入京故不能為謝子其為我謝之季共以告后山曰仲車之介當於古人中求他日掃門未晚也聞者兩賢之今之風爭古之紙鳶也創始於韓淮隂方是時陳豨反於代髙祖自將征之淮隂與豨約從中應作紙鳶以為期謀敗身戮而紙鳶之制今為兒戲使木罌渡軍沙囊壅水皆如紙鳶之無成則何以助漢王成業也爭當作箏蓋以竹篾弦其上風吹之鳴如箏也新塗縣道士何得一者常人也徽宗嘗夢有道士曰何得一者來見遂以姓名及狀貌圖像求之守令以其姓名之同遂以聞上大喜即令送至闕下既召見山野齷齪不能應對甚不稱上意時方集道流於寶籙宫作醮因命得一預焉建醮畢授丹林郎遣歸初得一之有是命也守令以其形於帝夢必有所得因問其有何技能得一以為昔浴於江中得杖子狀如龍又嘗噀水於壁問成罨畫山水守亦信之具以表聞後以詰其故杖乃木根初無他異而噀水成畫者因醉後嘔吐成迹耳故今人傳以為笑徽宗初建寶籙宫設醮車馬嘗臨幸迄事之夕道士以章疏俯伏奏之逾時不起其徒與旁觀者皆怪而不敢近又久之方起上宣問其故對曰臣章疏未上時偶值奎宿星官入奏故少候其退上曰奎宿何神對曰主文章之星今乃本朝從臣蘇軾為之上默然獨醒雜志卷一
