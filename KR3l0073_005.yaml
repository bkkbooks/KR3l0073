body:
  text: 獨醒雜志卷五宋曽敏行撰劉丞相在位時族人偶有逋負官租數十萬丞相不知也前後官吏望風不敢問程公珦為廬陵縣尉主賦事追逮囚繋責令盡償而後已或以告丞相丞相曰賦入不時吾家之罪縣官安可屈法也乃致書謝之後珦罷官至京師丞相延見禮貎有加珦出謂人曰劉公偉量非他人能及真宰相也江之神今封安濟順澤王凡江行有水族登舟舟人以為神見王荆公甞泛江歸金陵或見於舟状稍異舟人請公致禮公從容至前炷香揖之曰朝廷班爵公無拜侯之禮俄頃不見盖其時未封王爵也南昌潘興嗣延之號清逸居士五嵗受官既長不仕進趙清獻唐質肅薦之於朝除校書郎固辭不就紹興中趙丞相元鎮帥豫章奏言興嗣亷退自守足以風化有位元符中甞官其孫淳蔡京當國乃追奪其官今興嗣孫濤尚在乞賜推恩以旌善人濤遂補初品官客有謂東坡曰章子厚日臨蘭亭一本坡笑云工摹臨者非自得章七終不髙爾予甞見子厚在三司北軒所冩蘭亭两本誠如坡公之言范忠宣在永時苦目疾不復觀書有来謁者亦時舉諸經大義告之然未甞以為已出每舉一說終則曰此先公之訓也或曰此翼之先生之語也此眀復先生之語也公甞言學者當有所宗某自受教於翼之先生不敢有非僻之心林靈素以方士得幸徽廟跨一青牛出入禁衙號曰金門羽客一日有客来謁門者難之客曰予温人第入報靈素與鄉人厚即延見焉客入靈素問曰見我何為客曰有小術願試之即撚土炷爐中且求杯水噀案上覆之以杯忽報車駕来幸道院靈素倉皇出迎不及辭别而其人去上至院中聞香郁然異之問靈素何香對曰素所焚香上命取香再焚殊不𩔖屢易之而益非上疑之究詰頗力靈素不能隠遂以實對且言噀水覆杯事上命取杯来牢不可舉靈素自徃取愈牢上親徃取之應手而舉仍得片紙紙間有詩云捻土為香事有因如今宜假不宜真三朝宰相張天覺四海閒人吕洞賔靈素自是眷衰未㡬放歸温州而死秦少游謫古藤意忽忽不樂過衡陽孔毅甫為守與之厚延留待遇有加一日飲於郡齋少㳺作千秋嵗詞毅甫覽至鏡裏朱顔改之句遽驚曰少㳺盛年何為言語悲愴如此遂𢋫其韻以解之居數日别去毅甫送之於郊復相語終日歸謂所親曰秦少㳺氣貌大不𩔖平時殆不久於世矣未㡬果卒秦少㳺所賦浯溪中興詩過崖下時盖未曽題石也既行次永州因縦歩入市中見一士人家門户稍修潔遂直造焉謂其主人曰我秦少㳺也子以紙筆借我當冩詩以贈主人倉卒未能具時廊廡間有一木機瑩然少游即筆書於其上題曰張耒文潜作而以其名書之宣和間其木機尚存今此詩亦勒崖下矣歐陽公自南京留守奉母喪歸塟於瀧岡將興役忽隂雨彌月公念襄事愆期日夕憂懼里之父老徃吿公曰鄉有沙山之神乃吾郡太守也廟祀於此里人遇水旱禱之必應盍以告焉公乃為文齋潔而謁於神曰修扶䕶母喪歸祔先域大事有日隂雲屢興今即事矣幸神寛之假三日之不雨則終始之賜報徳何窮翌日天宇開霽始克舉事公後在政府一夕忽夢如坐官府門外列旗幟甚衆視其名號皆曰沙山公因感悟前事遂以神之嘉恵其民者聞於朝沙山今在祀典東鄉鄒公志完論立劉后䟽有曰若曰有子可以立為后則永平中貴人馬氏未甞有子所以立為后者以德冠後宫故也祥符中徳后劉氏亦未甞有子所以立為后者以鍾英甲族故也今若賢妃徳冠後宫亦如貴人鍾英甲族亦如徳后則何不於孟氏罪廢之初用立慈聖光獻故事便立之必遷延四年以待今日果何意耶必欲以示信天下天下之人果信之耶上怒甚内批貶志完新州疏留中不降出時人亦不知有何說也元符末崇慶眷方盛時相欲媒孽志完以固位乃偽為志完之疏傳之中外其間有云殺卓氏而奪之子欺人可也詎可欺天耶卓氏何辜哉廢孟后而立劉后快陛下之意可也奈天下耳目何劉氏何徳哉因指謫此語謂不可不眀白下新州取索元本志完不知索之由復申元藁不存諸人遂誣志完以為實有此說詔令應天尹孫槖以檻車徃新州收赴京師至泗上哲宗升遐其事遂寢崇寕初將再貶志完乃先下詔曰朕仰惟哲宗皇帝嚴恭寅畏克勤祇徳元符之末是生越王姦人造言謂非后出比閲臣僚舊疏適見椒房訴章載加考詳咸有顯證其時两宫親臨撫視嬪御執事在旁何縁外人得入宫禁殺母取子實為不根為人之弟繼體承祧豈使沽名之賊臣重害友恭之大義詆誣欺罔罪莫大焉其鄒浩可重行黜責以戒為臣之不忠者庶稱朕昭顯前人之意如更有言及者亦依此施行志完遂以衡州别駕永州安置建炎二年廬陵城頺圮太守楊淵興役修治之掘土數尺得一石函中有朽骨傍有一鏡役工方聚觀或以告淵淵令取鏡洗而視之其背有文曰唐興元之初仲春中己日吾季愛子役築於廬陵殞於西壘之垠未卜窆於他所就瘞於西壘之巔吾卜斯土後當火徳九五之間世衰道敗喪亂之時浙梁相繼章貢邦昌之日吾子亦復出於是邦東平鳩工决使吾季愛子聴命於水府矣京兆逸公深甫記淵覽而異之急遣問石函所在則役夫以為不祥棄之於江矣宣和六年山後將入版圖大農吿乏蔡李諸人遂建免夫錢之議江西一道凡賦錢一百五十七萬而漕運之費不預焉令下之日州縣莫知所措乃令税一千者輸一萬約日而集督責加峻時賦歛遽起民間嗟怨守令有觀望風㫖者建皂纛以令曰稍愆期即以乏軍興論人益皇懼小民徃徃去而為盗後夫錢之綱將至淮甸而敵騎已及郊錢皆為船人所私矣太祖時或詣司天官苗光裔問卜光裔布筭成卦謂曰當遷徙其人問不損人口否光裔曰無害既去又一人至其占如前又頃之又一人来占亦同仍有前問光裔疑之熟視其人容貎亦相肖差有老少之間光裔起曳其裾詰曰爾為誰其人不得已對曰我金眀池龜也前二人乃祖父朝廷今欲廣池且及我穴恐見殺故来問卜幸哀我垂救光裔釋之即以奏聞已而鑿池果得龜十數萬下令不得傷一龜盡輦送入水王樞宻倫初使金歸一行官吏恩數甚厚暨再使争願隨徃倫至金留不得還欲發一官屬歸報紛然請歸倫於是皆不遣方再使時請云到金有表歸書倫名引筆出鈎外則可歸不出則不歸矣惟秦丞相知之其家人皆不知也倫時以僉書奉使出家人仍在府第倫死於金朝廷秘其事所以禮遇其家者如初後其子弟因㳺觀作樂秦丞相聞之呼樞宻使府目謂曰樞宻死矣本欲更遷延以厚恩數今既不可湏即日發哀云秦丞相董恭政同執政二府之夫人俱入見恭政戒其夫人無妄奏對惟丞相夫人是從退歸丞相果問恭政夫人有何言夫人曰無所言丞相喜於是待恭政益親洪忠宣公皓紹興初以禮部尚書使金留之十五年既歸母太碩人董氏年八十餘矣請補外以便飬秦丞相檜素不樂公乃以徽猷閣學士出守鄉郡眀年大水時内侍白鍔從慈寧太后北歸負恃舊恩宣言爕理乖盭洪尚書名聞逺近顧乃不以為相語聞秦相大怒付鍔於理諫官承風㫖遂謂公與鍔為刎頸交更相譽說由是罷郡鍔遂髠流嶺表言者復謂公睥睨鈞衡謀為不靖遂貶英州居九年不及内徙而薨公饒州人字光弼先君甞言宣和間客京師時街巷鄙人多歌蕃曲名曰異國朝四國朝六國朝蠻牌序蓬蓬花等其言至俚一時士大夫亦皆歌之又相國寺雜貨物處凡物稍異者皆以番名之有两刀相並而鞘曰番刀有笛皆尋常差長大曰番笛及市井間多以絹畫畨國士馬以博塞先君以為不至京師才三四年而氣習一旦頓覺改變當時招致降人雜處都城徃來所致耳燕山招納之舉多出於蔡攸攸父子晩年争權相忌至以茶湯相見不交他語王師敗於白溝河元長甞以詩寄攸曰老懶身心不自由封書寄與淚横流百年信誓當深念三伏征涂盍少休目送旌旗如昨夢心存關塞起新愁緇衣堂下清風滿早早歸来醉一甌詩稍傳入禁中徽宗命京以進呈上閱畢曰三伏征涂不若改作六月王師詩復以還觀此詩則知是舉非惟當時人知其非雖其父亦知之矣鄭昺巵史作老慣人間不觧愁愁身帷幄若為籌昺京之客宜得其真余鄉民有燒畬於山岡每晨徃必見人憇於陰樹之石望之彷彿如釋教所謂觀音像者稍逼近則不見矣一日再徃所見如前即石求之瑩然如玉其中𨼆𨼆有觀音像𩔖今之繪者民以石歸龕而祠之自是生理日饒家用大昌民既死其二子析居兄請盡以家賄與弟而惟求其石弟亦願得石而盡舉家賄以遜其兄争之不已訴於郡太守取石藏之公帑而析其財由是争息郡經兵火帑藏皆毁石失所在老吏執事其時者甞見之為言如是有方外士為言蜀道永康軍城外崇徳廟乃祠李太守父子也太守名氷秦朝人甞守其地有龍為孽太守捕之且鑿崖中斷分江水一派入永康鎖孽龍於離堆之下有功於蜀人至今徳之祠祭甚盛每嵗用羊至四萬餘凡買羊以祭偶産羔者亦不敢留永康藉羊稅以充郡計江鄉人今亦祠之號曰灌口二郎每祭但烹一羶不設他物盖自是也予藏章伯益草蟲九便面筆勢飛動㡬奪造化後有孔毅甫周元翁米元章諸公題識客有謂伯益以名世何為善畵復如此而不多見也予觀修水集有題伯益飛岐圖亦嘉其㳺藝之精則伯益之墨戲當亦有藏之者矣東坡多雅謔甞與許冲元顧子敦錢穆父同舎一日冲元自牕外徃来東坡問何為冲元曰綏来東坡曰可謂奉大福以来綏盖冲元登科時賦句也冲元曰敲門瓦礫公尚記憶耶子敦肥碩當暑袒裼據鞍而寐東坡書四大字於其側曰顧屠肉案穆父眉目秀雅而時有九子東坡曰穆父可謂之九子母丈夫同舎皆大笑米元章甞冩其詩一卷投許冲元云芾自㑹道言語不襲古人年三十為長沙掾盡毁焚已前所作生平不録一篇投王公貴人遇知己索一二篇則以徃元豐中至金陵識王介甫過黄州識蘓子瞻皆不執弟子禮特敬前輩而已其髙自譽道如此至評章伯益書乃云如宫女揷花嬪嬙對鏡自有一般態度繼其後者誰歟襄陽米芾則元章於字畫間乃有所推重世謂元章學羅讓書盖其少時非得法於讓也董公敦逸永豐人元祐中立朝為侍御史彈擊不避貴近人畏憚之京師呼為白鬚御史元符厭詛事起皇城司具獄哲宗御批令公錄問中書不預知也公入獄引問見宫官奴婢十數人肢體皆毁折至有無眼耳鼻者氣息僅属言語亦不可曉問之只㸃頭不復能對公大驚閣筆不敢下内侍郝隨㫖促之且以言語脅公公不得已以其案上翌日上疏言中宫之廢事有所因情有可察詔下之日天為之隂翳是天不欲廢之也人亦為之流涕是人不欲廢也臣甞錄問知其非辜倘或不言誠恐得罪天下後世上大怒將議貶斥廷臣皆不敢言曽子宣徐奏曰陛下以皇城之獄出於近侍故特命敦逸録問今又貶敦逸臣恐天下疑惑矣上意乃解未幾竟出之獨醒雜志卷五
