body:
  text: 獨醒雜志卷二宋曽敏行撰紹興甲戍省試别院以中和節為詩題舉人上請主司答云元宵既過寒食未来盖謂此二月節也然按後漢周舉傳太原郡舊俗以介子推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民每遇中冬輒皆寒食莫敢煙爨老少不堪間或寒死故因謂寒食為禁煙節舉為刺史作弔書以觧民之惑則所謂寒食者果何與於清明耶今人以清明前三日為寒食不知又何據也劉丞相沆為士人時携一僕赴禮部夜卧忽驚起哭丞相怪問僕曰不祥殊甚不敢言再三詰之曰夢主君為人斫去頭丞相曰此乃吉證斫去頭㽞得項我當為第二人果於王拱辰榜第二人賜第坡谷同游鳯池寺坡公舉對云張丞相之佳萹昔曽三到山谷即答云栁屯田之妙句那更重来時稱名對張丞相詩云八十老翁無品秩昔曽三到鳯池来坡公盖取此也漢博士𨕖三科髙為尚書郎次為刺史其不通政事者以乆次補諸侯太傅此制最合人情予甞欲依倣漢制以處今之特奏名進士盖特奏第五等人皆以為諸州助教士人晚境至此亦疲矣然猶或至於納勅不願受者辭其名而冀其禄也又市井巫醫祝卜技藝之流孰不以助教自名士人役役於科目而與之無别宜其不樂聞也予謂不若因𥙷為本貫州縣學職以名次次第授之自上而下由州而邑三嵗而易新故相代盖以州縣學職言之則其名正予之以三年之禄則其禮優况今居是職者徃徃多後生新進躐取而强處之人多不服倘舉以授舊人亦得尚齒之義范忠宣公寓居永州東山寺時諸孫尚㓜一日戲狎言語少拂寺僧之意僧大怒叱罵不已公坐於堂上僧誦言過之語頗侵公公不之顧家人聞之或以吿公亦不應翌日僧悔悟大慚遂詣公致謝公慰藉之待之如初若未甞聞也宣和中太白見甚髙尚書劉公才劭時在中秘見而嘆曰是兵象也國家其有外患乎因與僚友同觀憂形顔色未㡬敵犯畿甸後周芑秀實来倅廬陵贈詩云劉郎校書天禄閣太白下觀光昭灼心知漢祀厄中天夜半瞻星涕零落尚書字羙中王荆公在相位子婦之親蕭氏子至京師因謁公公約之飯翌日蕭氏子盛服而徃意謂公必盛饌日過午覺飢甚而不敢去又久之方命坐果蔬皆不具其人既心怪之酒三行初供胡餅兩枚次供彘臠數四頃即供飯傍置菜羮而已蕭氏子頗驕縱不復下箸惟啖胡餅中間少許留其四傍公取顧自食之其人愧甚而退人言公在相位自奉𩔖不過如此两府例得墳院歐陽公既恭大政以素惡釋氏久而不請韓公為言之乃請瀧岡之道觀又以崇公之諱因奏改為西陽宫今𨽻吉之永豐後公罷政出守青社自為阡表刻碑以歸江行過采石舟裂碑沉舟人曰神如有知石將出有頃石果見遂得以歸立於其宫紹興乙邜宫焚不餘一瓦碑亭獨無恙信有神物䕶持云毛文㨗字長卿吉水人淳化三年進士及第王冀公與之為同年生雅相友善文㨗豪放不覊冀公素竒之景徳中知舒州望江縣冀公時知樞宻院薦知名士四十二人文㨗在其中獨以韜略許之真宗召至闕下親御便殿試以平西夏方略文㨗對極詳眀上大喜除秘書省校書郎其制詞云毛文㨗通經典禮廷對方謀兹謂碩材可宜旌勸夏英公帥江西日時豫章大疫公命醫製藥分給居民醫曰藥雖付之恐亦虛設公曰何故醫曰江西之俗尚鬼信巫每有疾病未嘗親藥餌也公曰如此則民死於非命者多矣不可以不禁止遂下令捕為巫者杖之其著聞者黥𨽻他州一嵗部内共治一千九百餘家江西自此滛巫遂息范忠宣公謫永州年七十餘矣每朔望日必陳列其家所藏四朝宸翰及宣賜器皿於堂上率其子孫羅拜其下拜畢緘藏如初然後長㓜相拜啜茶而退自始至及北歸未甞或輟先君官零陵時與公之去相望二十餘年士人多有識公者具言如此國初江西亦有鐡錢甞見玉笥山玉梁觀所藏經卷尾有題字云太平興國三年太嵗戊寅新塗楊名卿胡某使鐡錢一百二十貫足陌冩經六十卷玊梁觀後改為承天宫徽宗甞内晏顧問梁師成曰先王樂以天下憂以天下今西北既賔服天下幸無事朕因得㳺晏耳師成對曰臣聞聖人先天下之憂而憂後天下之樂而樂上問蔡京曰師成之言何如京曰樂不可極爾上喜曰京之言是也冦莱公謫居道州初至不諳風土欲得樓居以御嵐瘴之氣而力不能舉一日與客言之客曰此易事乃以語郡人於是争為出力營建不日落成及公薨道之人繪公像祠於樓上至今奉事唯謹吕丞相大防微仲罷相以大觀文出知潁昌府制有曰改元而後與政歴九年之間有國以来首相踵三人之乆盖自國初元祐為首相者居位多止七八年耳大觀四年五月彗星出於奎婁之間又自三月不雨至五月上頗焦勞䑓官吳執中等屢上章言蔡京罪惡上亦寖薄京之所為遂降授太子少保致仕給事中何昌言奏言大臣被降責湏有章疏及所得聖語文字俱合過門下省今京降官罷相乃止有麻制又録黄各一道並無事因乞依自来體例備今来行遣過門下省作定本關報庶使四方眀知京之罪狀上從之遂以章疏付外何給事字忠孺國朝自章聖始命致仕者給半俸然非得㫖者不與遵唐制也唐人致仕非有敕不給俸今致仕者例給其半與舊制異矣仁宗皇帝嘗步禁中聞廡外有譁者稍逼聴之乃二衛士甲曰人生富貴在命有無乙曰不然今日為宰相眀日有貶削為匹夫者今日為富家明日有官籍而没之者其權正在官家耳因相與詰難未服故争辨不已帝因宻識其人一日出金奩封緘甚宻特呼乙送徃内東門行將逹忽心腹痛作不堪忍懼愆其期偶與甲遇令代捧以先門司啟奩乃得御批云去人給事有勞可保明補官乙隨至則辯曰既得㫖送奩及門疾作令甲代之爾門司復奏帝命與持至者甲遂補官唐子西内前行為張天覺作也天覺自中書侍郎除右僕射蔡京以少保致仕四海歡呼善𩔖増氣時彗星見而遽沒旱甚而雨人皆以為天覺拜相感召所致上大喜書商霖二字以賜之且謂之曰髙宗得傅說以為用汝作霖雨今朕相卿非是之謂耶故子西之詩具言之其詩云内前車馬撥不開文徳殿下聴麻囬紫微侍郎拜右相中使押赴文昌䑓旄頭昨夜光照牖是夕収芒如禿帚明日化為甘雨来官家喚作調元手周公禮樂未要作致身姚宋也不惡鄉来兩公當國年民間斗米三四錢張楚僣偽遣快行親事往廬州省視其家經由淮南向公子諲伯恭時為發運使因拘囚之驗其文劵見南京副總管嘗資給其人甚厚伯恭遂檄使勤王有不可汚張廵許逺之地語後達上聴深嘉伯恭之慷慨忠節也蔡絛約之好學知趋向為徽猷閣待制時作西清詩話一編多載元祜諸公詩詞文采臣寮論列以為絛所撰私文專以蘓軾黄庭堅為本有誤人學術遂落職勒停祖宗官制同是一官而遷轉凡數等自將作監主簿至秘書監其遷移各視其品若卿列舘職則為一等出身人則為一等廕補人則為一等雜流則為一等所以甄别流品為至嚴宻也自諌議大夫至吏部尚書其遷除則為一等盖两省官皆極天下之選論思獻納號為侍從故不復分等級然其超等而遷則惟宰相執政而已宰相超三官執政超两官將作主簿今承務郎諫議大夫今大中大夫秘書監今中大夫吏部尚書今紫微光禄大夫湖湘官道窮日之力僅能盡两驛父老相傳以為冦萊公為丁曺所誣衊謫為道州司馬欲以憂困殺之隂令於衡湘間十里則去一堠以為五里故道里之長如是公既居道一日宴客忽報中人傳勅來且有持劔前行者坐客皆失色公不為動中人既至公謂曰願先見勅中人出勅示乃貶雷州司户因就郡僚假緑綬拜命終罷江西自國初以来士人未有以状元及第者紹聖四年何忠孺昌言始以對䇿居第一里人傳以為盛事故謝民師有詩寄忠孺云萬里一時開驥足百年今始破天荒盖記時人之語也東坡還至庾嶺上少憇村店有一老翁出問從者曰官為誰曰蘓尚書曰是蘓子瞻歟曰是也乃前揖坡曰我聞人害公者百端今日北歸是天佑善人也東坡笑而謝之因題一詩於壁間云鶴骨霜髯心既灰青松夹道手親栽問翁大庾嶺頭住曽見南遷㡬個迴徐公師川甞言東坡長短句有云山下蘭芽短浸溪松間沙路净無泥白樂天詩云桞橋時有絮沙路潤無泥净潤两字當有能辯之者劉公仲偃自河東河北宣撫使召歸除京城四壁守禦使與時相議不合鐫官落職奉祠京城既失守金欲得公用事者詔公以割地遣詣金營金得公喜甚即館於僧寺遣人為言國相知公名將欲大用公曰偷生以事二姓有死不可國相謂尼瑪哈公守真定時金人攻城不能下再入㓂而公已去真定遂䧟故以此知公也車駕既北狩金復遣人謂公曰請以家北去取富貴無徒死公仰天大呼曰有是乎召其指使陳灌謂曰國破主遷乃欲用我我寧死耳即手書片紙付灌持歸報其子以衣絛縊死尼雅滿聞而嘆曰是忠臣也令塟之公薨八十日其子始克具棺殮顔色如生人以為忠節之氣所致云朝廷褒其死節諡忠顯又賜碑額為旌忠褒節之碑公名韐建安人元祐初山谷與東坡錢穆父同㳺京師寳梵寺飯罷山谷作草書數紙東坡甚稱賞之穆父從旁觀曰魯直之字近於俗山谷曰何故穆父曰無他但未見懐素真蹟爾山谷心頗疑之自後不肯為人作草書紹聖中謫居涪陵始見懐素自叙於石楊休家因借之以歸摹臨累日㡬廢寢食自此頓悟草法下筆飛動與元祐已前所書大異始信穆父之言為不誣而穆父死已久矣故山谷甞自謂得草書於涪陵恨穆父不及見也米元章有嗜古書畵之癖每見他人所藏臨冩逼真甞與蔡攸在舟中共觀王衍字元章即捲軸入懐起欲赴水攸驚問何為元章曰生平所蓄未甞有此故寧死耳攸不得已遂以贈之豫章晷漏乃曽南仲所造南仲自少年通天文之學宣和初登進士第授南昌縣尉時龍圖孫公為帥深加愛重南仲因請更定晷漏帥大喜命南仲召匠制之遂範金為壺刻木為箭壺後置四盆一斛壺之水資於盆盆之水資於斛其注水則為銅蚪張口而吐之箭之傍為二木偶左者晝司刻夜司㸃其前設鐡板每一刻一㸃則擊板以告右者晝司辰夜司更其前設銅鉦每一辰一更則鳴鉦以告又為二木圜其一用木薦之以測日景其一用水轉之以法天運制器甚精為法甚宻皆前所未有南仲夜觀乾象每預言其遷移躔次甞言有某星某夜當到某分時窮冬盛寒仰卧床上徹其屋瓦以觀之偶睡着霜下遂為寒氣所侵而死其學惜無傳焉獨晷漏之制其子甞聞其大概今江鄉諸縣亦有能造之者南仲名民瞻廬陵睦陂人也南仲甞謂古人揆景之法載之經傳雜説者不一然止皆較景之短長實與漏刻未甞相應也其在豫章為晷景圖以木為規四分為廣而殺其一状如缺月書辰刻於其旁為基以薦之缺上而圎下南髙而北低當規之中植緘以為表表之兩端一指北極一指南極春分已後視北極之表秋分已後視南極之表所得晷景與刻漏相應自負此圖以為得古人所未至予甞以其制為之其最異者二分之日南北之表皆無影獨其側有景以其側應赤道春分已後日入赤道内秋分已後日出赤道外二分日行赤道故南北皆無影也其制作窮賾如此獨醒雜志卷二
