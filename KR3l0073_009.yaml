body:
  text: 獨醒雜志卷九宋曽敏行撰建炎末吕丞相頥浩以勤王復辟之功進登相位嘗在中書怒一堂吏命去其巾幘吏對祖宗以來宰相無去堂吏巾幘法公曰去堂吏巾幘當自我始吏不能對苖劉之變張魏公自平江興兵討賊二人懼甚朱丞相勝非因説之曰兵至則不必戰戰而不勝則汝危矣不若先請復辟以贖罪故魏公兵及境而復辟初魏公之起兵也先遣士人馮轓入奏因以好詞諭二人欲緩其謀轓與二人之幕客馬柔吉相善因令宿于柔吉之所以覘軍情轓至而事略定勝非因奏輔轓京官除郎中其後乃謂人曰轓蜀人德逺遣之來不過欲成就之耳似未知魏公之意也紹興講解既成上自執政大臣下至臺諫侍從以為非是者稍稍引去於是登顯位據要途者皆阿附時宰以為恱外之監司郡守或傾陷正人以希進流人逐客之落南者其迹益危潮守則劾奏趙丞相湖南帥則隂中張魏公儋耳則睥睨李大參舂陵則誣治王樞密其他紛紛者不可勝數蔡元長為相日置講議司官吏數百人俸給優異費用不資一日集僚屬會議因留飲命作蟹黃饅頭飲罷吏略計其費饅頭一味為錢一千三百餘緡又嘗有客集其家酒酣京顧庫吏曰取江西官員所送鹹䜴來吏以十瓶進客分食之乃黃雀肫也元長問尚有幾何吏對以猶餘八十有竒龍德宫出幸童貫自太原竄歸時廷議欲請淵聖親征命貫留守貫聞之心不自安乃將勝捷軍三千餘人追從龍德之駕繼而朝廷論貫不告而逃及首禍罪惡請誅之而貫在外領兵以扈從為名恐復生事遂詔聶山為江淮發運使密圖其事山既陛辭將出國門左丞李綱言於上曰貫之罪惡雖已著明然今在上皇左右投鼠不可不忌器若欲誅斥明出一詔書足矣何用詭祕如此上深然之遂貶貫池陽繼有嶺南之命范公宗尹廷對訐直人所難言紹興以來鄙夫賤𨽻猶能誦之淵聖在東宫時知其名及即位遂以兵部侍郎召宗尹既立朝首論崇寧以來上下欺罔復論蔡京童貫朱勔等罪惡物望大聳及金人犯闕耿南仲主和議宗尹力附其説時廷臣有進言金不可和者宗尹在殿上厲聲叱曰朝廷大論已定小臣不敢有異論議者始非之建炎中宗尹以盛年執政裂江北之地或五七郡或三四郡使數大將鎮撫之又於沿江易置帥藩創立安撫大使但約每帥相去七百里不問形勢如何雖池州僻陋小邦亦置江東大帥其後李成以蘄黃舒光四州叛乃鎮撫之人也余居之西背驛道有地曰金牛驛意古之郵亭也驛傍有長沙王墓逺望如丘阜故老相傳曰此漢長沙王墓也長沙王在漢固多特未知其為誰余遊贑聞有金精山者始因吳芮將兵征南越尉陀聞此山有美女鑿石求之遂通山路或者吳芮嘗至江西而史不及也此墓恐芮軍所營爾建炎叛卒嘗發之斸地尋丈見石槨皆錮以鐡卒不能啓其下有飲酒湖地窪以深可坐百人俗傳為奠酹成池若非軍旅中恐不能如是也北苑産茶有四十六所廣袤三十餘里分內外園江南李氏初置使本朝丁晉公行漕事始製龍鳳團以進然嵗不過四十餅慶歷中蔡端明為漕復有增益元豐中神宗有旨造密雲龍其品又髙于小龍團今嵗貢三等十有二綱四萬九千餘銙贑之雩都尉廳後舊有灌嬰廟臨其池上廟毁往往瓴甓墮池中嵗年不可計矣因刀鑷工取半瓦為礪石人見而異之遂求其瓦為硯於是有灌瓦之名求者既多今罕得全瓦好事者以銅雀瓦不復有亦謾蓄之南粵俗尚蠱毒詛呪可以殺人亦可以救人以之殺人而不中者或至自斃往有客遊南中暑行憩林下見一青蛇長二尺許戲以杖擊之蛇即逝去客旋覺體中不佳夜宿于逆旅主人怪問曰君何從有毒氣在面也客惘然不能對主人曰試語今日所見客告之故主人曰是所謂報寃蛇人有觸之不逺百里襲迹而至必噬人之心乃已此蛇今夕當至客懼求救主人許諾即出龕中所供一竹筒祝之以授客曰不必省苐置枕旁邊通夕張燈尸寢以俟聞聲即啓之客如戒夜分有聲在屋瓦間俄有物墮几上筒中亦窣窣響應舉之乃蜈蚣長尺許盤跚而出繞客之身三匝徑至几上有頃復歸筒中客即覺體力醒然逮旦視之則前所見蛇斃焉客始信主人之不妄重謝而去又一客亦以暮夜投宿舍翁與其子睥睨客所擕客疑之乃物色翁所為覘見其父子出獼猴繪像禱之甚謹乃戒僕終夕不寐仗劔以伺已乃推户而入者即一獼猴人身而長揮劔逐之逡巡失去有頃聞哭聲則舍翁之子死矣陳忠肅公居南康日一夕忽夢中得六言絶句云靜坐一川煙雨未辨雷音起處夜深風作輕寒清曉月明歸去既覺語其子弟且令記之次年徙居山陽見歷日於壁間忽點頭曰此其時矣以筆點清明日曰是日佳也人莫知何謂乃以其年清明日卒劉寬夫僴丞相沆之孫也崇觀中為次對靖炎間廢罷嘗得旨敘復祕閣修撰臣僚論列以為其所歷差遣則為大晟府按協聲律及提舉道籙院管幹文字其所轉官則緣按樂精熟及修道籙院與管幹明節皇后園陵其所賜帶則因撰祥應記其所𬒳譴則以臣僚論其交結附會寬夫由是終身不復職名宣和甲辰廷試進士以氣數為問周表卿執羔素通此學對䇿極該博自謂當魁多士或告之沈元用從貂璫假籌布算而後答問表卿驚曰果爾吾當少遜之矣然亦不在他人下也翌日臚唱元用居第一表卿次之泗州浮屠下有僧伽像徽宗時改僧為德士僧皆頂冠泗州太守亦令以冠加於像上忽天地晦冥風雨驟至冠裂為兩飛墜于門外舉城驚怖莫知所為守遽詣拜曰僧伽有神吾不敢強遂止徽宗時邊事大興程鄰于西廣置隆兌二州又置大觀州湖北又置靖州建官分職與內地等費不可勝計靖州初無賦入歲于湖廣撥錢七八萬以養官兵有損無益紹興中朱子發內翰嘗奏欲廢為一縣以禦邊徼上頗許之且曰前朝開拓土疆似此等處尤為無益首議之臣深為可罪既而事亦寢而不行鄉人李秀實嘗守是郡為余言州雖無益于朝廷然屯駐重兵非假之事權則不足以鎮撫倘併歸辰沅一州而置軍使則亦足矣維揚后土廟有花潔白而香號為瓊花宣和間起花石綱因取至御苑數年不花乃杖之遣還其地花開如故是殆風氣土地使然抑果有神司之耶東安一士人善畫作鼠一軸獻之邑令令初不知愛謾懸於壁旦而過之軸必墜地屢懸屢墜令怪之黎明物色軸在地而貓蹲其傍逮舉軸則踉蹡逐之以試羣貓莫不然者於是始知其畫為逼真其作八景圖亦殊有幽致如洞庭秋月則不見月江天莫雪則不見雪苐狀其清朗苦寒之態耳若瀟湘夜雨尤難形容常畫者至作行人張蓋以别之渠但作漁舟吹火於津渡以火明髣佛有見則危亭在岸連檣在步耳瀟湘舊有故人亭往來􅋈舟其下故藉此以見也米元章謂八景圖為宋迪得意之筆意其如此吉水玄潭觀臨大江上江中有旋渦相傳云有舟沒於此久而不見蹤迹乃出於豫章吳成山下以為江有别道由旋渦而入晉朝有蛟為害嘗出沒渦中許旌陽捕逐至其處旁有巨石裂而為二其痕如削云是旌陽試劔石且云旌陽鑄鐡作蓋覆渦上今水泛時其渦乃見大觀四年張天覺商英為相蔡元長致仕時忽有偽詔傳布天下其間謂元長公行狡詐行迹諂諛復云今後州縣有蔡京蹤迹盡皆削除有蔡京朋黨悉皆貶削陳州守臣以聞朝廷詔諸路以五千為賞捕撰造者其罪不以赦原竟不能獲張懷素吳儲吳侔等謀反事覺中外縉紳多與交結而蔡元長與儲侔之父安詩為僚壻故元長父子與懷素書問往來尤密懼其根株牽連罪且相及遂諷中丞余深知開封府林攄曰若能使不見纍他日當有以報深等會其意翌日索中外所與懷素儲侔往來書札置案上問獄吏曰此何文也對曰與懷素等交通之書也深詬曰懷素等罪狀明白人與往來書問不過通寒暄耳豈盡從之仄也存之徒增案牘令悉焚之事遂不及蔡氏因之而幸免者甚衆未幾攄遷中書侍郎深左丞何執中居相位時京師童謡曰殺了穜蒿割了蔡吃了羔兒荷葉在説者謂指童貫蔡京髙俅三人及執中也崇寧二年鑄大錢蔡元長建議俾為折十民間不便之優人因內晏為賣漿者或投一大錢飲一杯而索償其餘賣漿者對以方出市未有錢可更飲漿乃連飲至於五六其人鼓腹曰使相公改作折百錢奈何上為之動法由是改又大農告乏時有獻廪俸減半之議優人乃為衣冠之士自冠帶衣𥚑𬒳身之物輒除其半衆怪而問之則曰減半已而兩足共穿半袴􅚢而來前復問之則又曰減半問者乃長歎曰但知減半豈料難行語傳禁中亦遂罷議􅚢牽盈切一足行也童貫竄嶺南言者謂貫姦凶不宜置之逺地且其誤國之罪當正典刑淵聖以為然乃命監察御史張徵乘驛斬之既出國門復得御札三字速密全即晝夜兼行追至南安驛舍斬之函首京師梟於東市邵武人黃南強字應南與先君俱調官都下傾蓋定交時仲兄侍側應南與先君齊年一日謂先君曰初意二君為兄弟不敢以為父子也君有子如此而吾方娶不已晚乎先君後數年棄諸孤又十餘年而應南來守廬陵求訪先君則宰木以拱矣應南晚得子而康強壽考及見其成人因知人患無壽不患無子也應南當官持亷所至見稱云車戰之法既不盡傳於後世兵車之制亦不復見于南方在春秋時申公巫臣奔吳教之乘車教之射御則江之南亦可用矣江鄉有一等車隻輪兩臂以一人推之隨所欲運别以竹為篰載兩傍束之以繩幾能勝三人之力登髙度險亦覺穩捷雖羊腸之路可行余謂兵家可倣其制而造之行以運糧止以衛陳戰以拒馬若鑿池築城非倉卒可辦得此車周邅連比則人馬皆不能越或進或退惟我所用名之曰活城柳公度云不以氣海熟生物暖冷物時號善養生者余異時數蹈之未知悔也年踰五十老形具見因誦少陵詩云衰年關膈冷味暖併無憂特書坐間以自警三孔之先本田家翁嘗步行入巖谷間少憩覺和氣燠然心甚愛之已而忘歸逮暮家人尋至其地問故翁曰我覺此山中氣暖與他處異若我死當葬于此踰年而沒其家從其言後遂生司封君再世而生經甫伯仲其地今在新淦縣之西岡江西人遇元夕多以人靜時微行聽人言語以占一嵗之所為通塞新喻李仲謙為舉子時是夕行于溪上見漁者炬火捕魚其一連呼曰裏大有裏大有仲謙聞而異之其年秋試更名大有遂中選劉殿院次莊長沙人自幼喜書嘗寓於新淦所居民屋牆壁窗户題寫殆遍臨江郡庠有法帖十卷釋以小楷他法帖之所無也所善毛公弼何君表皆里中先達兩家碑志多其所書者獨醒雜志卷九
